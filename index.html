<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="./assets/Fav-icon1.png" type="image/x-icon">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icon Form Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200 p-8">
    <section class="max-w-5xl mx-auto">
        <!-- Title -->
        <h1 class="text-4xl font-bold mb-6">Job Application Tracker</h1>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Total</div>
                <div id="totalCount" class="stat-value text-primary">0</div>
            </div>

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Interview</div>
                <div id="interviewCount" class="stat-value text-success">0</div>
            </div>

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Rejected</div>
                <div id="rejectedCount" class="stat-value text-error">0</div>
            </div>

        </div>

        <!-- Available Jobs Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Available Jobs</h2>
            <span id="jobCounter" class="text-sm text-gray-800">0 jobs</span>
        </div>

        <!-- Filters -->
        <div class="mb-6 space-x-2">
            <button class="btn btn-primary btn-sm" onclick="filterJobs('all')">All</button>
            <button class="btn btn-click btn-ghost btn-sm" onclick="filterJobs('interview')">Interview</button>
            <button class="btn btn-ghost btn-sm" onclick="filterJobs('rejected')">Rejected</button>
        </div>

        <!-- Job List -->
        <div id="jobList" class="space-y-4"></div>

    </section>



    <script src="./jobDetails.js"></script>
</body>

</html>
