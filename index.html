<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icon Form Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind & DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.2/dist/full.css" rel="stylesheet" />

    * {
    font-family: "Geist", sans-serif;
    }
</head>

<body class="bg-base-200 p-8">
    <section class="max-w-5xl mx-auto">
        <!-- Title -->
        <h1 class="text-4xl font-bold mb-6">Job Application Tracker</h1>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Total</div>
                <div id="totalCount" class="stat-value text-primary">0</div>
            </div>

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Interview</div>
                <div id="interviewCount" class="stat-value text-success">0</div>
            </div>

            <div class="stat bg-base-100 rounded-box shadow">
                <div class="stat-title">Rejected</div>
                <div id="rejectedCount" class="stat-value text-error">0</div>
            </div>

        </div>

        <!-- Available Jobs Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Available Jobs</h2>
            <span id="jobCounter" class="text-sm text-gray-500">0 jobs</span>
        </div>

        <!-- Filters -->
        <div class="mb-6 space-x-2">
            <button class="btn btn-primary btn-sm" onclick="filterJobs('all')">All</button>
            <button class="btn btn-ghost btn-sm" onclick="filterJobs('interview')">Interview</button>
            <button class="btn btn-ghost btn-sm" onclick="filterJobs('rejected')">Rejected</button>
        </div>

        <!-- Job List -->
        <div id="jobList" class="space-y-4"></div>

    </section>
    <script>

        const jobs = [
            {
                id: 1,
                company: "Mobile First Corp",
                role: "React Native Developer",
                location: "Remote • Full-time",
                salary: "$130,000 - $175,000",
                status: "not applied"
            },
            {
                id: 2,
                company: "WebFlow Agency",
                role: "Web Designer & Developer",
                location: "Los Angeles, CA • Part-time",
                salary: "$80,000 - $120,000",
                status: "not applied"
            },
            {
                id: 3,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            },
            {
                id: 4,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            },
            {
                id: 5,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            },
            {
                id: 6,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            },
            {
                id: 7,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            },
            {
                id: 8,
                company: "DataViz Solutions",
                role: "Data Visualization Specialist",
                location: "New York • Full-time",
                salary: "$90,000 - $140,000",
                status: "not applied"
            }
        ];

        const jobList = document.getElementById("jobList");

        function renderJobs(filter = "all") {

            jobList.innerHTML = "";

            let filteredJobs = jobs.filter(job => {
                if (filter === "all") return true;
                return job.status === filter;
            });

            document.getElementById("jobCounter").innerText =
                filteredJobs.length + " jobs";

            filteredJobs.forEach(job => {

                jobList.innerHTML += `
      <div class="card bg-base-100 shadow relative">

        <!-- Trash Icon Top Right -->
        <button onclick="deleteJob(${job.id})"
          class="btn btn-ghost btn-sm absolute right-2 top-2">
        <span class="text-red-500">
          🗑️ <i class="fa-sharp fa-regular fa-circle-trash"></i>
        </span>
          </button>

        <div class="card-body">
          <h2 class="card-title">${job.company}</h2>
          <p class="font-medium">${job.role}</p>
          <p class="text-sm text-gray-500">
            ${job.location} • ${job.salary}
          </p>

          <div class="mt-2">
            <span class="badge ${job.status === "interview" ? "badge-success" :
                        job.status === "rejected" ? "badge-error" :
                            "badge-neutral"
                    }">
              ${job.status.toUpperCase()}
            </span>
          </div>

          <div class="card-actions mt-4">
            <button class="btn btn-success btn-sm"
              onclick="updateStatus(${job.id}, 'interview')">
              Interview
            </button>

            <button class="btn btn-error btn-sm"
              onclick="updateStatus(${job.id}, 'rejected')">
              Rejected
            </button>
          </div>

        </div>
      </div>
    `;
            });

            updateStats();
        }

        function updateStatus(id, newStatus) {
            const job = jobs.find(j => j.id === id);
            job.status = newStatus;
            renderJobs();
        }

        function deleteJob(id) {
            const index = jobs.findIndex(j => j.id === id);
            if (index !== -1) {
                jobs.splice(index, 1);
                renderJobs();
            }
        }

        function filterJobs(type) {
            renderJobs(type);
        }

        function updateStats() {
            document.getElementById("totalCount").innerText = jobs.length;
            document.getElementById("interviewCount").innerText =
                jobs.filter(j => j.status === "interview").length;
            document.getElementById("rejectedCount").innerText =
                jobs.filter(j => j.status === "rejected").length;
        }

        renderJobs();

    </script>


    <script src="./jobDetails.js"></script>
</body>

</html>
